name: Nikkei225 Two Step LINE Notify

on:
  schedule:
    - cron: "30 22 * * *"   # 日本時間 7:30
    - cron: "55 23 * * *"   # 日本時間 8:55
  workflow_dispatch:
    inputs:
      notify_mode:
        description: "MORNING or PREOPEN"
        required: true
        default: "MORNING"

jobs:
  morning:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 22 * * *'
    runs-on: ubuntu-latest
    env:
      NOTIFY_MODE: ${{ github.event.inputs.notify_mode || 'MORNING' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          NOTIFY_MODE: ${{ env.NOTIFY_MODE }}

  preopen:
    if: github.event.schedule == '55 23 * * *'
    runs-on: ubuntu-latest
    env:
      NOTIFY_MODE: PREOPEN

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          NOTIFY_MODE: PREOPEN
